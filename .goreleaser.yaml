version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ltm
    main: ./cmd/ltm
    binary: ltm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/dennisdevulder/ltm/internal/cli.Version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      ltm_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - SPEC.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^chore:'
      - '^docs:'
      - '^test:'

release:
  draft: false
  prerelease: auto
  # release-please creates the GitHub Release before GoReleaser runs; 'append'
  # means GoReleaser attaches artifacts to the existing release instead of
  # trying to replace it.
  mode: append
  header: |
    ## ltm {{.Tag}}

    Portable understanding for AI work sessions.

    ```
    curl -fsSL https://ltm-cli.dev/install | sh
    ```
